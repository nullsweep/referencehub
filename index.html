<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const domains = window.__DOMAINS__;

const T = {
  bg: "#06080d",
  bg2: "#0c1018",
  surface: "#111827",
  surfaceHover: "#1a2236",
  border: "#1c2740",
  borderLit: "#2d4068",
  text: "#c2cee3",
  textDim: "#5e7193",
  heading: "#e6ecf5",
  code: "#7dd3fc",
  codeBg: "#080d16",
  green: "#00e5a0",
};

// ─────────────────────────────────────────────────────────────
// COMPONENT
// ─────────────────────────────────────────────────────────────

function PentestDB() {
  const [activeDomain, setActiveDomain] = useState("nmap");
  const [activeSection, setActiveSection] = useState("nmap-discovery");
  const [search, setSearch] = useState("");
  const [globalSearch, setGlobalSearch] = useState("");
  const [copied, setCopied] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const domain = domains.find((d) => d.id === activeDomain);
  const section = domain?.sections.find((s) => s.id === activeSection);

  // Global search across everything
  const globalResults = useMemo(() => {
    if (!globalSearch || globalSearch.length < 2) return null;
    const q = globalSearch.toLowerCase();
    const results = [];
    domains.forEach((d) =>
      d.sections.forEach((s) =>
        s.entries.forEach((e) => {
          if (e.cmd.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q)) {
            results.push({ ...e, domainId: d.id, domainLabel: d.label, sectionTitle: s.title, sectionId: s.id, color: d.color });
          }
        })
      )
    );
    return results;
  }, [globalSearch]);

  const filteredEntries = section?.entries.filter((e) => {
    if (!search) return true;
    const q = search.toLowerCase();
    return e.cmd.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q);
  });

  const copy = (text, key) => {
    navigator.clipboard.writeText(text);
    setCopied(key);
    setTimeout(() => setCopied(null), 1200);
  };

  const totalEntries = domains.reduce((a, d) => a + d.sections.reduce((b, s) => b + s.entries.length, 0), 0);

  return (
    <div style={{ fontFamily: "'JetBrains Mono','Fira Code','SF Mono',monospace", background: T.bg, color: T.text, minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:${T.bg}}
        ::-webkit-scrollbar-thumb{background:${T.border};border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:${T.borderLit}}
        .row-hover{transition:background 0.1s}
        .row-hover:hover{background:${T.surfaceHover} !important}
        .sb-item{transition:all 0.12s;cursor:pointer;border:none;outline:none;text-align:left;width:100%;background:none}
        .sb-item:hover{background:${T.surfaceHover}}
        .dom-tab{transition:all 0.15s;cursor:pointer;border:none;outline:none;white-space:nowrap}
        .dom-tab:hover{opacity:1 !important}
        .flash{animation:fl 0.25s ease}
        @keyframes fl{0%{background:${T.green}22}100%{background:transparent}}
        @media(max-width:768px){.sidebar-desktop{display:none !important}.mobile-show{display:block !important}}
      `}</style>

      {/* ── TOP BAR ── */}
      <div style={{ background: T.bg2, borderBottom: `1px solid ${T.border}`, padding: "14px 20px", position: "relative" }}>
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: `linear-gradient(90deg, ${domains.map(d => d.color).join(",")})`, opacity: 0.7 }} />
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "10px" }}>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
              <span style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: "10px", fontWeight: 600, letterSpacing: "2.5px", color: T.green, textTransform: "uppercase" }}>⬡ PENTEST / CTF</span>
              <span style={{ fontSize: "9px", color: T.textDim, background: T.surface, padding: "2px 8px", borderRadius: "3px" }}>{totalEntries} entries</span>
            </div>
            <h1 style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: "20px", fontWeight: 700, color: T.heading, marginTop: "2px" }}>Offensive Security Cheatsheet</h1>
          </div>
          <div style={{ position: "relative", minWidth: "220px", maxWidth: "360px", flex: 1 }}>
            <span style={{ position: "absolute", left: "10px", top: "50%", transform: "translateY(-50%)", color: T.textDim, fontSize: "12px" }}>⌕</span>
            <input
              type="text"
              placeholder="Global search all domains..."
              value={globalSearch}
              onChange={(e) => setGlobalSearch(e.target.value)}
              style={{ width: "100%", padding: "8px 10px 8px 28px", fontSize: "11px", fontFamily: "inherit", background: T.codeBg, border: `1px solid ${T.border}`, borderRadius: "5px", color: T.text, outline: "none" }}
              onFocus={(e) => (e.target.style.borderColor = T.green)}
              onBlur={(e) => (e.target.style.borderColor = T.border)}
            />
          </div>
        </div>

        {/* Domain tabs */}
        <div style={{ display: "flex", gap: "4px", marginTop: "12px", overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
          {domains.map((d) => (
            <button
              key={d.id}
              className="dom-tab"
              onClick={() => { setActiveDomain(d.id); setActiveSection(d.sections[0].id); setSearch(""); setGlobalSearch(""); }}
              style={{
                padding: "6px 14px",
                fontSize: "11px",
                fontFamily: "'Space Grotesk',sans-serif",
                fontWeight: activeDomain === d.id ? 700 : 500,
                color: activeDomain === d.id ? d.color : T.textDim,
                background: activeDomain === d.id ? d.color + "12" : "transparent",
                borderRadius: "5px 5px 0 0",
                borderBottom: activeDomain === d.id ? `2px solid ${d.color}` : "2px solid transparent",
                opacity: activeDomain === d.id ? 1 : 0.7,
              }}
            >
              {d.label}
            </button>
          ))}
        </div>
      </div>

      {/* ── GLOBAL SEARCH RESULTS ── */}
      {globalResults && (
        <div style={{ flex: 1, overflow: "auto", padding: "16px 20px" }}>
          <p style={{ fontSize: "11px", color: T.textDim, marginBottom: "12px" }}>
            {globalResults.length} result{globalResults.length !== 1 ? "s" : ""} for "{globalSearch}"
          </p>
          {globalResults.length === 0 && <p style={{ color: T.textDim, fontSize: "12px" }}>No matches found.</p>}
          {globalResults.map((r, i) => (
            <div
              key={i}
              className={`row-hover ${copied === `g-${i}` ? "flash" : ""}`}
              onClick={() => copy(r.cmd, `g-${i}`)}
              style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: "12px", padding: "8px 12px", borderBottom: `1px solid ${T.border}08`, cursor: "pointer", borderRadius: "4px" }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: "8px", minWidth: 0 }}>
                <span style={{ fontSize: "8px", color: r.color, fontWeight: 700, flexShrink: 0, fontFamily: "'Space Grotesk',sans-serif", letterSpacing: "0.5px" }}>{r.domainLabel.toUpperCase()}</span>
                <code style={{ fontSize: "11px", color: T.code, wordBreak: "break-all", lineHeight: 1.4 }}>{r.cmd}</code>
                <span style={{ fontSize: "8px", color: copied === `g-${i}` ? T.green : T.textDim, flexShrink: 0, opacity: copied === `g-${i}` ? 1 : 0.3 }}>
                  {copied === `g-${i}` ? "✓" : "⎘"}
                </span>
              </div>
              <span style={{ fontSize: "10px", color: T.textDim, textAlign: "right", whiteSpace: "nowrap" }}>{r.desc}</span>
            </div>
          ))}
        </div>
      )}

      {/* ── MAIN LAYOUT ── */}
      {!globalResults && (
        <div style={{ display: "flex", flex: 1, minHeight: 0, overflow: "hidden" }}>
          {/* Sidebar */}
          <div className="sidebar-desktop" style={{ width: "220px", flexShrink: 0, background: T.bg2, borderRight: `1px solid ${T.border}`, overflowY: "auto", padding: "8px 0" }}>
            {domain?.sections.map((s) => (
              <button
                key={s.id}
                className="sb-item"
                onClick={() => { setActiveSection(s.id); setSearch(""); }}
                style={{
                  display: "block",
                  padding: "8px 16px",
                  fontSize: "11px",
                  fontFamily: "'IBM Plex Mono',monospace",
                  color: activeSection === s.id ? domain.color : T.textDim,
                  fontWeight: activeSection === s.id ? 600 : 400,
                  borderLeft: activeSection === s.id ? `2px solid ${domain.color}` : "2px solid transparent",
                }}
              >
                {s.title}
                <span style={{ display: "block", fontSize: "9px", color: T.textDim, opacity: 0.6, marginTop: "1px" }}>{s.entries.length} entries</span>
              </button>
            ))}
          </div>

          {/* Content */}
          <div style={{ flex: 1, overflow: "auto", padding: "16px 20px" }}>
            {/* Mobile section selector */}
            <select
              className="mobile-show"
              value={activeSection}
              onChange={(e) => { setActiveSection(e.target.value); setSearch(""); }}
              style={{ display: "none", width: "100%", marginBottom: "12px", padding: "8px", fontSize: "12px", fontFamily: "inherit", background: T.surface, color: T.text, border: `1px solid ${T.border}`, borderRadius: "5px" }}
            >
              {domain?.sections.map((s) => <option key={s.id} value={s.id}>{s.title}</option>)}
            </select>

            {section && (
              <>
                <div style={{ marginBottom: "14px" }}>
                  <h2 style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: "16px", fontWeight: 700, color: T.heading }}>{section.title}</h2>
                  <p style={{ fontSize: "11px", color: T.textDim, marginTop: "2px", fontStyle: "italic" }}>{section.desc}</p>
                </div>

                <div style={{ position: "relative", marginBottom: "14px", maxWidth: "360px" }}>
                  <span style={{ position: "absolute", left: "10px", top: "50%", transform: "translateY(-50%)", color: T.textDim, fontSize: "12px" }}>⌕</span>
                  <input
                    type="text"
                    placeholder={`Filter ${section.title}...`}
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    style={{ width: "100%", padding: "7px 10px 7px 28px", fontSize: "11px", fontFamily: "inherit", background: T.codeBg, border: `1px solid ${T.border}`, borderRadius: "5px", color: T.text, outline: "none" }}
                    onFocus={(e) => (e.target.style.borderColor = domain.color)}
                    onBlur={(e) => (e.target.style.borderColor = T.border)}
                  />
                </div>

                <div style={{ border: `1px solid ${T.border}`, borderRadius: "6px", overflow: "hidden" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr auto", padding: "8px 14px", background: T.surface, borderBottom: `1px solid ${T.border}`, fontSize: "9px", fontWeight: 600, letterSpacing: "1.5px", textTransform: "uppercase", color: T.textDim, fontFamily: "'Space Grotesk',sans-serif" }}>
                    <span>Command / Filter</span>
                    <span>Description</span>
                  </div>

                  {filteredEntries?.length === 0 && (
                    <div style={{ padding: "24px", textAlign: "center", color: T.textDim, fontSize: "12px" }}>No matches</div>
                  )}

                  {filteredEntries?.map((e, i) => {
                    const isSeparator = e.desc === "─────────────────────────────────";
                    const key = `${activeSection}-${i}`;
                    if (isSeparator) {
                      return (
                        <div key={i} style={{ padding: "10px 14px 4px", background: T.bg2, borderBottom: `1px solid ${T.border}15` }}>
                          <span style={{ fontSize: "10px", fontWeight: 600, color: domain.color, fontFamily: "'Space Grotesk',sans-serif", letterSpacing: "0.5px", opacity: 0.8 }}>{e.cmd.replace(/^#\s*---\s*/, "").replace(/\s*---$/, "")}</span>
                        </div>
                      );
                    }
                    return (
                      <div
                        key={i}
                        className={`row-hover ${copied === key ? "flash" : ""}`}
                        onClick={() => copy(e.cmd, key)}
                        style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: "12px", alignItems: "start", padding: "8px 14px", borderBottom: `1px solid ${T.border}08`, cursor: "pointer", background: i % 2 === 0 ? "transparent" : `${T.surface}33` }}
                      >
                        <div style={{ display: "flex", alignItems: "center", gap: "7px", minWidth: 0 }}>
                          <code style={{ fontSize: "11.5px", color: T.code, wordBreak: "break-all", lineHeight: 1.45 }}>{e.cmd}</code>
                          <span style={{ fontSize: "8px", color: copied === key ? T.green : T.textDim, flexShrink: 0, opacity: copied === key ? 1 : 0.3, transition: "all 0.15s" }}>
                            {copied === key ? "✓" : "⎘"}
                          </span>
                        </div>
                        <span style={{ fontSize: "10.5px", color: T.textDim, textAlign: "right", whiteSpace: "nowrap" }}>{e.desc}</span>
                      </div>
                    );
                  })}
                </div>
                <p style={{ fontSize: "9px", color: T.textDim, marginTop: "8px", opacity: 0.4 }}>Click any row to copy · {section.entries.length} entries in this section</p>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PentestDB />);
</script>
</body>
</html>
